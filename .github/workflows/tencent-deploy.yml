name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: shanyuan-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  TENCENT_DEPLOY_HOST: 150.109.253.189
  TENCENT_DEPLOY_PORT: '22'
  TENCENT_DEPLOY_USER: root

jobs:
  verify:
    name: Build verification
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

  deploy:
    name: Deploy production
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://shanyuan.199305.icu
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure deployment SSH key
        env:
          TENCENT_DEPLOY_KEY: ${{ secrets.TENCENT_DEPLOY_KEY }}
        run: |
          test -n "$TENCENT_DEPLOY_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$TENCENT_DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' '150.109.253.189 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFEBjXK2ldroFSst22fLKOdhIQ+N010fiE1eemG4hCC4' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Sync application source
        run: |
          rsync -rlptz \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude 'test-artifacts/' \
            --exclude '.dev.vars' \
            --exclude '.dev.vars.*' \
            --exclude '.env.tencent' \
            --exclude 'backups/' \
            --exclude 'deploy/tencent/shanyuan-backup.service' \
            --exclude 'deploy/tencent/shanyuan-backup.timer' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $TENCENT_DEPLOY_PORT -o StrictHostKeyChecking=yes" \
            ./ "$TENCENT_DEPLOY_USER@$TENCENT_DEPLOY_HOST:/opt/shanyuan/"

      - name: Rebuild containers and verify server health
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$TENCENT_DEPLOY_PORT" -o StrictHostKeyChecking=yes "$TENCENT_DEPLOY_USER@$TENCENT_DEPLOY_HOST" 'bash -s' <<'REMOTE'
            set -euo pipefail
            cd /opt/shanyuan
            test -f .env.tencent

            docker compose -p shanyuan --env-file .env.tencent \
              -f deploy/tencent/docker-compose.yml \
              -f deploy/tencent/docker-compose.existing-nginx.yml \
              -f deploy/tencent/docker-compose.self-hosted.yml \
              up -d --build

            for attempt in $(seq 1 15); do
              if curl -fsS --max-time 10 http://127.0.0.1:18790/api/health; then
                exit 0
              fi
              sleep 4
            done

            docker compose -p shanyuan --env-file .env.tencent \
              -f deploy/tencent/docker-compose.yml \
              -f deploy/tencent/docker-compose.existing-nginx.yml \
              -f deploy/tencent/docker-compose.self-hosted.yml \
              ps
            docker logs --tail 100 shanyuan-api-1 || true
            exit 1
          REMOTE

      - name: Verify public HTTPS health endpoint
        run: curl --fail --show-error --silent --max-time 20 https://shanyuan.199305.icu/api/health
